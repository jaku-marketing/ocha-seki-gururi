<!DOCTYPE html>
<!-- お茶席ぐるり — 説明（RPG式テキスト） -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お茶席ぐるり — 説明</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .app.setsu{ background:#e8dccd; cursor:pointer; }
  .scene{ position:relative; flex:1 1 auto; min-height:100dvh; }
  .scene-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:top center; z-index:0; }
  .back{ position:absolute; top:12px; left:12px; z-index:5; background:rgba(255,255,255,.85); border-radius:99px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--ink); box-shadow:var(--shadow-s); }
  .dialog{ position:absolute; left:12px; right:12px; bottom:calc(42px + env(safe-area-inset-bottom)); z-index:2; background:rgba(255,253,252,.97); border:3px solid #fff; border-radius:20px; box-shadow:var(--shadow); padding:16px 18px 48px; min-height:200px; display:flex; flex-direction:column; }
  .who{ display:inline-block; font-weight:900; font-size:13px; color:#fff; background:linear-gradient(180deg,var(--pink),var(--pink-d)); border-radius:10px; padding:3px 13px; margin-bottom:10px; align-self:flex-start; }
  .line{ margin:0; font-size:15.5px; line-height:1.9; font-weight:700; color:var(--ink); min-height:5.4em; flex:0 0 auto; white-space:pre-line; }
  .adv{ align-self:flex-end; margin-top:10px; font-size:12.5px; font-weight:800; color:#fff; background:linear-gradient(180deg,var(--pink),var(--pink-d)); border-radius:99px; padding:6px 14px; box-shadow:var(--shadow-s); animation:blink 1.2s ease-in-out infinite; }
  @keyframes blink{ 50%{ opacity:.5; } }
  .start{ display:inline-flex; width:100%; margin-top:8px; }
  .skip{ position:absolute; top:12px; right:12px; z-index:5; background:rgba(255,255,255,.85); border-radius:99px; padding:7px 14px; font-size:12px; font-weight:700; color:var(--ink-soft); box-shadow:var(--shadow-s); border:0; }
  @media (prefers-reduced-motion:reduce){ .adv{ animation:none; } }
</style>
</head>
<body>
<div class="app setsu" id="app">
  <div class="scene">
    <img class="scene-img" id="sceneImg" src="img/img_setsumei02.png" alt="先生">
    <a class="back" href="index.html">← もどる</a>
    <button class="skip" id="skip" type="button">スキップ ▶</button>
    <div class="dialog" id="dialog">
      <span class="who">先生</span>
      <p class="line" id="line"></p>
      <span class="adv" id="adv">▼ タップで次へ</span>
      <a class="btn pink start" id="startBtn" href="step1.html" style="display:none">はじめる ▶</a>
    </div>
  </div>
</div>
<script>
"use strict";
(function(){
  // 時期（タイムスタンプ）から季節を判定し、季語＋禅語の時候の挨拶を出し分け
  const M=new Date().getMonth()+1;
  const season=(M>=3&&M<=5)?'spring':(M>=6&&M<=8)?'summer':(M>=9&&M<=11)?'autumn':'winter';
  const GREET={
    spring:"ようこそ、『お茶席ぐるり』へ。\n春たけなわ、若草の萌え出づる候となりました。\n禅語に「春入千林処々鶯（はる せんりんに いり しょしょ うぐいす）」と申します。うららかな心で、どうぞごゆるりと。",
    summer:"ようこそ、『お茶席ぐるり』へ。\n青葉のまぶしい、風炉の候となりました。\n禅語に「薫風自南来（くんぷう みなみより きたる）」と申します。涼やかな心で、どうぞごゆるりと。",
    autumn:"ようこそ、『お茶席ぐるり』へ。\n木々の色づき、月の冴ゆる候となりました。\n禅語に「掬水月在手（みずを むすべば つき てにあり）」と申します。澄んだ心で、どうぞごゆるりと。",
    winter:"ようこそ、『お茶席ぐるり』へ。\n炉の恋しい、寒さきびしき候となりました。\n禅語に「梅花和雪香（ばいか ゆきに わして かんばし）」と申します。あたたかな心で、どうぞごゆるりと。"
  };
  const LINES=[
    GREET[season],
    "わたくしが、このアプリの使い方をご案内いたします。\nお稽古では、みなで順に〈亭主〉〈正客〉〈詰め〉のお役を務めますね。\nされど人数が増えるほど、その段取りは骨の折れるもの。",
    "このアプリは、その席順をひと息に組み上げます。\n誰のお役も重ならず、出番と出番のあいだには、ちゃんと休憩（お控え）が入るように。\n気配りは、こちらにお任せを。",
    "使い方は、たったの三歩。\nまず ①〈参加する人〉を選び、つぎに ②〈並び順〉を決める。\nそれだけで、きれいな席順表ができあがります。",
    "並び順は、年功序列・ランダム・手動の三つから。\n先輩を立てるもよし、くじ引きのように楽しむもよし。\nその日の趣向で、自在にお選びください。",
    "できあがった席順は ③ で画像に保存できます。\n皆で囲んで、今日のお役を確かめましょう。\nスマホに残せば、お稽古の場でもすぐに確かめられます。",
    "茶の湯の心は、一期一会。\nこの一会は、二度とない一会にございます。\nどうぞ、よいひとときになりますように——\nそれでは、はじめましょう。"
  ];
  const $=id=>document.getElementById(id);
  const lineEl=$('line'), advEl=$('adv'), startBtn=$('startBtn'), sceneImg=$('sceneImg');
  const FR={ closed:'img/img_setsumei02.png', open:'img/img_setsumei03.png', smile:'img/img_setsumei04.png' };
  [FR.closed,FR.open,FR.smile,'img/img_setsumei01.png'].forEach(s=>{ const im=new Image(); im.src=s; });
  let i=0, chars=[], pos=0, typing=false, timer=null, done=false, mouth=null, mo=false;
  function startMouth(){ stopMouth(); mouth=setInterval(()=>{ mo=!mo; sceneImg.src=mo?FR.open:FR.closed; },170); }
  function stopMouth(){ if(mouth){ clearInterval(mouth); mouth=null; } sceneImg.src=FR.closed; }
  function smile(){ stopMouth(); sceneImg.src=FR.smile; }
  function type(){ chars=Array.from(LINES[i]); pos=0; typing=true; lineEl.textContent=''; advEl.style.display=''; advEl.textContent='▼ タップで次へ'; startMouth();
    clearInterval(timer); timer=setInterval(()=>{ lineEl.textContent=chars.slice(0,++pos).join(''); if(pos>=chars.length){ clearInterval(timer); typing=false; stopMouth(); } },36); }
  function finish(){ clearInterval(timer); lineEl.textContent=chars.join(''); typing=false; stopMouth(); }
  function advance(){ if(done) return; if(typing){ finish(); return; } if(i<LINES.length-1){ i++; type(); } else { done=true; advEl.style.display='none'; startBtn.style.display='inline-flex'; smile(); } }
  $('app').addEventListener('click', e=>{ if(e.target.closest('a,button')) return; advance(); });
  document.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight'){ e.preventDefault(); advance(); } });
  $('skip').addEventListener('click', ()=>{ clearInterval(timer); i=LINES.length-1; chars=Array.from(LINES[i]); lineEl.textContent=LINES[i]; typing=false; done=true; advEl.style.display='none'; startBtn.style.display='inline-flex'; smile(); });
  type();
})();
</script>
</body>
</html>
